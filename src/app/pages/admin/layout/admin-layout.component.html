<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="admin-brand">
      <a class="admin-logo" routerLink="/admin/staff" title="Jama Go Admin">
        <img
          src="/JamaGoLogo-trim.png"
          alt="Jama Go Security Equipment"
          width="176"
          height="53"
          decoding="async"
        />
      </a>
      <p class="admin-eyebrow"><i class="admin-eyebrow-dot"></i> Command Center</p>
    </div>

    <nav class="admin-nav">
      <a routerLink="/admin/staff" routerLinkActive="active">Staff</a>
      <a routerLink="/admin/contacts" routerLinkActive="active">Contacts</a>
      <a routerLink="/" class="admin-nav-muted">Back to site</a>
    </nav>

    <div class="admin-user">
      <p>{{ auth.currentUser()?.fullName }}</p>
      <small>{{ auth.currentUser()?.email }}</small>
      <button type="button" class="btn btn-ghost btn-sm" (click)="logout()">Sign out</button>
    </div>
  </aside>

  <div class="admin-content">
    <router-outlet />
  </div>
</div>
